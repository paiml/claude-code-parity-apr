  Why it matters:

    M32d (numerical parity vs llama.cpp Q4_K + HF FP16) has been open
    since 2026-04-23 with `apr run` emitting "%%%%%%%%" gibberish
    against the cached 17.3 GB Qwen3-Coder GGUF. Forward-chain
    plumbing is correct (`apr run` exits 0 in 62.5s); divergence is
    numeric. M34 converts the open work from "iterate on output until
    it stops being gibberish" (no localization signal) to "produce
    concrete cosine numbers at each layer-component boundary,
    localize divergence, target fix" via a 6-step ordered-and-gated
    plan with HF FP16 fixture as the comparison anchor.

  Five-whys summary (full version in spec + contract status_history):

    1. Why "%%%%%%%%"?       greedy argmax repeats one token
    2. Why?                  logits dominated by one direction
                             regardless of context
    3. Why?                  hidden state is context-invariant through
                             all 48 layers
    4. Why?                  bug in attention/FFN/MoE/RMSNorm/quant —
                             unknown which because we have NO per-layer
                             reference comparison anywhere in tree
    5. Cheapest experiment:  HF FP16 fixture (M32d.1 script exists,
                             hasn't been run) → cosine number → wire
                             `apr trace --payload` for qwen3_moe →
                             bisect.

  6-step plan:
    1 — run M32d.1 script, commit fixture, get a cosine number.
    2 — wire `apr trace --payload` into qwen3_moe forward (today
        returns null per-layer stats).
    3 — bisect per-layer cosine, name first divergent layer.
    4 — sub-bisect that layer's components, name root cause.
    5 — apply 1–8 targeted fixes, each its own falsifier.
    6 — discharge: qwen3-moe-forward-v1 DRAFT → ACTIVE_RUNTIME,
        ccpa measure runs against teacher fixture,
        FALSIFY-CCPA-013 measured (not synthetic) for the first time.

  Component priors at Step 4 (LAYOUT-001/002 + bug history):
    rank 1 — per-expert weight LAYOUT (transpose) — 30%
    rank 2 — Q4_K_M dequant scale interaction — 20%
    rank 3 — Qwen3 per-head Q/K RMSNorm — 15%
    rank 4 — RoPE θ=1e7 vs default 1e4 — 10%
    rank 5 — MoE router softmax renormalize — 10%
    rank 6 — token embedding dequant — 10%
    rank 7 — KV cache / lm_head transpose / other — 5%

